<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <defs>
    <linearGradient id="cyanGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#c8a96e"/>
    </linearGradient>
    <linearGradient id="goldCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a96e"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Emblem: Girih hexagon with R -->
  <g transform="translate(10, 8)">
    <!-- Outer hex -->
    <polygon points="32,2 58,17 58,47 32,62 6,47 6,17"
      fill="none" stroke="url(#cyanGold)" stroke-width="1.2" opacity="0.9" filter="url(#glow)"/>
    <!-- Inner hex -->
    <polygon points="32,10 50,20 50,44 32,54 14,44 14,20"
      fill="none" stroke="#c8a96e" stroke-width="0.7" opacity="0.5"/>
    <!-- Girih lines -->
    <line x1="32" y1="2" x2="32" y2="62" stroke="#00d4ff" stroke-width="0.4" opacity="0.25"/>
    <line x1="6" y1="32" x2="58" y2="32" stroke="#00d4ff" stroke-width="0.4" opacity="0.25"/>
    <line x1="6" y1="17" x2="58" y2="47" stroke="#c8a96e" stroke-width="0.3" opacity="0.2"/>
    <line x1="6" y1="47" x2="58" y2="17" stroke="#c8a96e" stroke-width="0.3" opacity="0.2"/>
    <!-- Diamond center -->
    <polygon points="32,22 42,32 32,42 22,32"
      fill="none" stroke="url(#goldCyan)" stroke-width="1" opacity="0.6"/>
    <circle cx="32" cy="32" r="3" fill="#c8a96e" opacity="0.7"/>

    <!-- Letter R -->
    <text x="22" y="43" font-family="Cinzel, serif" font-size="28" font-weight="700"
      fill="url(#cyanGold)" opacity="0.95" letter-spacing="0">R</text>
  </g>

  <!-- RAYYON text -->
  <g transform="translate(76, 0)">
    <text x="0" y="45" font-family="Cinzel, serif" font-size="30" font-weight="900"
      letter-spacing="8" fill="none" stroke="url(#cyanGold)" stroke-width="0.5">
      <tspan fill="#00d4ff">RAY</tspan><tspan fill="#c8a96e">YON</tspan>
    </text>
    <text x="2" y="63" font-family="Rajdhani, sans-serif" font-size="9" font-weight="500"
      letter-spacing="6" fill="#c8a96e" opacity="0.7">RESTORAN</text>
    <!-- Underline girih -->
    <path d="M0,67 Q100,62 190,67" fill="none" stroke="url(#cyanGold)" stroke-width="0.6" opacity="0.5"/>
  </g>
</svg>
