services:
  - type: web
    name: rayyon-restoran
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --chdir backend app:app --workers 1 --timeout 120 --keep-alive 5 --log-level info --bind 0.0.0.0:$PORT
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: KITCHEN_TOKEN
        generateValue: true
      - key: DAILY_REPORT_HOUR
        value: "22"
      - key: NOTIF_INTERVAL
        value: "60"
      - key: ALLOWED_ORIGINS
        value: "https://rayyon-restoran.onrender.com"
      # MAJBURIY: Render dashboard > Environment da qo'lda o'rnating!
      # Default 'rayyon2024' paroli xavfli — kuchli parol kiriting.
      - key: ADMIN_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: rayyon-db
          property: connectionString
      # Redis (ixtiyoriy) — multi-worker rejimi uchun. Qo'shish: Render Redis xizmati ulaning
      # - key: REDIS_URL
      #   fromService:
      #     name: rayyon-redis
      #     type: redis
      #     property: connectionString
      # VAPID kalitlari (Push Notifications uchun ixtiyoriy)
      # pywebpush --gen-keys buyrug'i bilan yarating
      # - key: VAPID_PRIVATE_KEY
      #   value: "..."
      # - key: VAPID_PUBLIC_KEY
      #   value: "..."
      # - key: VAPID_EMAIL
      #   value: "admin@rayyon.uz"

databases:
  - name: rayyon-db
    databaseName: rayyon
    plan: free
